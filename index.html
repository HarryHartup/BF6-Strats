<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BF6 Strat Roulette</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0e;
    --bg2: #111418;
    --bg3: #181d22;
    --card: #1a2028;
    --border: #2a3540;
    --border2: #3a4a58;
    --accent: #e8a020;
    --accent2: #c46a10;
    --blue: #3a9bd5;
    --red: #d94040;
    --green: #3db870;
    --muted: #6a7f8f;
    --text: #d8e8f0;
    --text2: #8aa0b0;
    --chaos: #c03030;
    --hard: #9030c0;
    --fun: #208050;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  header {
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    height: 64px;
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text2); font-weight: 400; font-size: 14px; letter-spacing: 2px; }
  .header-rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Cards */
  .roulette-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  @media (max-width: 640px) { .roulette-grid { grid-template-columns: 1fr; } }

  .slot-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .slot-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.6;
  }
  .slot-card.strat-card::before { background: var(--blue); }

  .card-header {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .card-header-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .strat-card .card-header-title { color: var(--blue); }

  .lock-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 3px;
    padding: 3px 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .lock-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lock-btn.locked { border-color: var(--accent); color: var(--accent); background: rgba(232,160,32,0.08); }
  .strat-card .lock-btn:hover { border-color: var(--blue); color: var(--blue); }
  .strat-card .lock-btn.locked { border-color: var(--blue); color: var(--blue); background: rgba(58,155,213,0.08); }

  .lock-icon { font-size: 12px; }

  .card-body {
    padding: 1.25rem 1rem;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .result-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .result-name {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: 1px;
  }
  .result-effect {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.5;
    flex: 1;
  }
  .result-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 0.25rem;
  }
  .tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 2px;
  }
  .tag-chaos { background: rgba(192,48,48,0.15); color: #e05050; border: 1px solid rgba(192,48,48,0.3); }
  .tag-hard { background: rgba(144,48,192,0.15); color: #c070e0; border: 1px solid rgba(144,48,192,0.3); }
  .tag-fun { background: rgba(32,128,80,0.15); color: #50d090; border: 1px solid rgba(32,128,80,0.3); }
  .tag-players { background: rgba(50,80,100,0.3); color: var(--text2); border: 1px solid var(--border2); }

  /* Spinning animation */
  .card-body.spinning .result-name,
  .card-body.spinning .result-effect,
  .card-body.spinning .result-id,
  .card-body.spinning .result-tags {
    animation: flickerSlot 0.08s steps(1) infinite;
  }
  @keyframes flickerSlot {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .card-body.landing .result-name {
    animation: landFlash 0.4s ease-out;
  }
  @keyframes landFlash {
    0% { color: var(--accent); }
    100% { color: var(--text); }
  }
  .strat-card .card-body.landing .result-name {
    animation: landFlashBlue 0.4s ease-out;
  }
  @keyframes landFlashBlue {
    0% { color: var(--blue); }
    100% { color: var(--text); }
  }

  /* Roll button */
  .roll-section {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .roll-btn {
    background: var(--accent);
    color: #0a0c0e;
    border: none;
    border-radius: 3px;
    padding: 0.75rem 2.5rem;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .roll-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .roll-btn:hover::before { opacity: 1; }
  .roll-btn:active { transform: scale(0.97); }
  .roll-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .roll-btn.secondary {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border2);
    font-size: 13px;
    padding: 0.75rem 1.5rem;
  }
  .roll-btn.secondary:hover { border-color: var(--text2); color: var(--text); }

  /* History */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .history-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.6rem 1rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem 1rem;
    font-size: 13px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .history-item:hover { opacity: 1; }
  .history-item:first-child { opacity: 1; }
  .h-label { color: var(--muted); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
  .h-val { color: var(--text2); }
  .h-val strong { color: var(--text); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 0.25rem;
  }
  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 2px;
    padding: 4px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active-chaos { border-color: var(--chaos); color: #e05050; background: rgba(192,48,48,0.1); }
  .filter-btn.active-hard { border-color: var(--hard); color: #c070e0; background: rgba(144,48,192,0.1); }
  .filter-btn.active-fun { border-color: var(--fun); color: #50d090; background: rgba(32,128,80,0.1); }

  .players-input {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-left: auto;
  }
  .players-input label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .players-input input {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 2px;
    padding: 4px 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    width: 48px;
    text-align: center;
  }
  .players-input input:focus { outline: none; border-color: var(--accent); }

  /* Empty state */
  .empty-state {
    color: var(--muted);
    font-size: 14px;
    font-style: italic;
  }

  /* Reroll single button inside card */
  .reroll-single {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0.5rem 1rem;
    border-top: 1px solid var(--border);
    background: var(--bg3);
  }
  .reroll-single button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 2px;
    padding: 3px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reroll-single button:hover { border-color: var(--accent); color: var(--accent); }
  .strat-card .reroll-single button:hover { border-color: var(--blue); color: var(--blue); }
</style>
</head>
<body>

<header>
  <div class="logo">BF6 <span>// STRAT ROULETTE</span></div>
  <div class="header-rule"></div>
</header>

<main>
  <div class="filter-bar">
    <span class="filter-label">Difficulty</span>
    <button class="filter-btn" id="f-fun" onclick="toggleFilter('fun')">Fun</button>
    <button class="filter-btn" id="f-chaos" onclick="toggleFilter('chaos')">Chaos</button>
    <button class="filter-btn" id="f-hard" onclick="toggleFilter('hard')">Hard</button>
    <div class="players-input">
      <label for="squad-size">Squad</label>
      <input type="number" id="squad-size" min="1" max="4" value="4">
    </div>
  </div>

  <div class="roulette-grid">
    <!-- Modifier slot -->
    <div class="slot-card" id="mod-card">
      <div class="card-header">
        <span class="card-header-title">Modifier</span>
        <button class="lock-btn" id="mod-lock" onclick="toggleLock('mod')">
          <span class="lock-icon">○</span> Lock
        </button>
      </div>
      <div class="card-body" id="mod-body">
        <div class="empty-state">Press ROLL to start</div>
      </div>
      <div class="reroll-single">
        <button onclick="rerollOne('mod')">↻ Reroll modifier</button>
      </div>
    </div>

    <!-- Strat slot -->
    <div class="slot-card strat-card" id="strat-card">
      <div class="card-header">
        <span class="card-header-title">Squad Strat</span>
        <button class="lock-btn" id="strat-lock" onclick="toggleLock('strat')">
          <span class="lock-icon">○</span> Lock
        </button>
      </div>
      <div class="card-body" id="strat-body">
        <div class="empty-state">Press ROLL to start</div>
      </div>
      <div class="reroll-single">
        <button onclick="rerollOne('strat')">↻ Reroll strat</button>
      </div>
    </div>
  </div>

  <div class="roll-section">
    <button class="roll-btn" id="main-roll" onclick="rollAll()">⟳ ROLL</button>
    <button class="roll-btn secondary" onclick="clearHistory()">Clear History</button>
  </div>

  <div class="section-title">Roll History</div>
  <div class="history-list" id="history-list">
    <div class="empty-state" style="padding:1rem 0">No rolls yet.</div>
  </div>
</main>

let state = {
  mod: null,
  strat: null,
  modLocked: false,
  stratLocked: false,
  diffFilter: null,
  history: []
};

function getSquadSize() {
  return parseInt(document.getElementById('squad-size').value) || 4;
}

function getFilteredPool(pool) {
  let filtered = pool;
  if (state.diffFilter) {
    filtered = filtered.filter(x => x.difficulty === state.diffFilter);
  }
  return filtered;
}

function getFilteredStrats() {
  const sq = getSquadSize();
  let filtered = STRATS.filter(s => s.minPlayers <= sq);
  if (state.diffFilter) filtered = filtered.filter(s => s.difficulty === state.diffFilter);
  return filtered;
}

function pickRandom(arr, exclude) {
  const options = exclude ? arr.filter(x => x.id !== exclude.id) : arr;
  if (!options.length) return arr[Math.floor(Math.random() * arr.length)];
  return options[Math.floor(Math.random() * options.length)];
}

function renderSlot(slotId, item) {
  const body = document.getElementById(slotId + '-body');
  if (!item) { body.innerHTML = '<div class="empty-state">No results match filters</div>'; return; }
  const tagHtml = `<span class="tag tag-${item.difficulty}">${item.difficulty}</span>` +
    (item.minPlayers ? `<span class="tag tag-players">${item.minPlayers}+ players</span>` : '');
  body.innerHTML = `
    <div class="result-id">#${String(item.id).padStart(3,'0')}</div>
    <div class="result-name">${item.name}</div>
    <div class="result-effect">${item.effect || item.description}</div>
    <div class="result-tags">${tagHtml}</div>
  `;
}

function animateSpin(bodyId, finalItem, onDone) {
  const body = document.getElementById(bodyId);
  body.classList.add('spinning');
  const mockNames = ['SCANNING...','LOADING...','TARGET ACQUIRED','DEPLOYING...','STANDBY...'];
  let ticks = 0;
  const total = 12;
  const interval = setInterval(() => {
    body.innerHTML = `<div class="result-id">###</div><div class="result-name">${mockNames[ticks % mockNames.length]}</div><div class="result-effect">...</div>`;
    ticks++;
    if (ticks >= total) {
      clearInterval(interval);
      body.classList.remove('spinning');
      renderSlot(bodyId.replace('-body',''), finalItem);
      body.classList.add('landing');
      setTimeout(() => body.classList.remove('landing'), 500);
      onDone && onDone();
    }
  }, 70);
}

function rollAll() {
  const modPool = getFilteredPool(MODIFIERS);
  const stratPool = getFilteredStrats();
  const btn = document.getElementById('main-roll');
  btn.disabled = true;

  const newMod = state.modLocked ? state.mod : pickRandom(modPool, state.mod);
  const newStrat = state.stratLocked ? state.strat : pickRandom(stratPool, state.strat);

  let done = 0;
  const finish = () => { done++; if (done === 2) { btn.disabled = false; pushHistory(newMod, newStrat); } };

  if (!state.modLocked) {
    animateSpin('mod-body', newMod, finish);
    state.mod = newMod;
  } else {
    finish();
  }

  if (!state.stratLocked) {
    animateSpin('strat-body', newStrat, finish);
    state.strat = newStrat;
  } else {
    finish();
  }
}

function rerollOne(type) {
  if ((type === 'mod' && state.modLocked) || (type === 'strat' && state.stratLocked)) return;
  const pool = type === 'mod' ? getFilteredPool(MODIFIERS) : getFilteredStrats();
  const current = type === 'mod' ? state.mod : state.strat;
  const next = pickRandom(pool, current);
  if (type === 'mod') state.mod = next;
  else state.strat = next;
  animateSpin(type + '-body', next, null);
}

function toggleLock(type) {
  if (type === 'mod') {
    state.modLocked = !state.modLocked;
    updateLockBtn('mod-lock', state.modLocked);
  } else {
    state.stratLocked = !state.stratLocked;
    updateLockBtn('strat-lock', state.stratLocked);
  }
}

function updateLockBtn(id, locked) {
  const btn = document.getElementById(id);
  btn.innerHTML = locked ? '<span class="lock-icon">●</span> Locked' : '<span class="lock-icon">○</span> Lock';
  btn.classList.toggle('locked', locked);
}

function toggleFilter(diff) {
  state.diffFilter = state.diffFilter === diff ? null : diff;
  ['fun','chaos','hard'].forEach(d => {
    const btn = document.getElementById('f-' + d);
    btn.className = 'filter-btn' + (state.diffFilter === d ? ` active-${d}` : '');
  });
}

function pushHistory(mod, strat) {
  if (!mod && !strat) return;
  state.history.unshift({ mod, strat, ts: new Date().toLocaleTimeString() });
  if (state.history.length > 8) state.history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!state.history.length) {
    list.innerHTML = '<div class="empty-state" style="padding:1rem 0">No rolls yet.</div>';
    return;
  }
  list.innerHTML = state.history.map((h, i) => `
    <div class="history-item">
      <div>
        <div class="h-label">Modifier</div>
        <div class="h-val"><strong>${h.mod ? h.mod.name : '—'}</strong></div>
      </div>
      <div>
        <div class="h-label">Strat</div>
        <div class="h-val"><strong>${h.strat ? h.strat.name : '—'}</strong></div>
      </div>
    </div>
  `).join('');
}

function clearHistory() {
  state.history = [];
  renderHistory();
}
